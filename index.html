<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siddhesh's Task Manager</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            margin: 0;
        }

        .container {
            background: white;
            width: 350px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #1a73e8;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            outline: none;
        }

        input:focus {
            border-color: #1a73e8;
        }

        button#add-btn {
            padding: 10px 15px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f8f9fa;
            margin-bottom: 8px;
            padding: 12px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #1a73e8;
        }

        .delete-btn {
            color: #d63031;
            cursor: pointer;
            font-weight: bold;
            border: none;
            background: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Siddhesh's Tasks</h2>
    
    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Add a new task...">
        <button id="add-btn" onclick="addTask()">Add</button>
    </div>

    <ul id="taskList">
        <!-- Tasks will appear here -->
    </ul>
</div>

<script>
    function addTask() {
        const input = document.getElementById('taskInput');
        const taskText = input.value.trim();
        
        if (taskText === "") return;

        const li = document.createElement('li');
        li.innerHTML = `
            <span>${taskText}</span>
            <button class="delete-btn" onclick="this.parentElement.remove()">X</button>
        `;

        document.getElementById('taskList').appendChild(li);
        input.value = "";
    }

    // Allow "Enter" key to add task
    document.getElementById('taskInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') addTask();
    });
</script>

</body>
</html>
